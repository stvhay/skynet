name: Release

on:
  push:
    branches: [main]

concurrency:
  group: version-bump
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.event.head_commit.message, 'release:') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for unreleased changes
        id: check
        run: |
          if grep -q '## Unreleased' CHANGELOG.md; then
            echo "has_unreleased=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_unreleased=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        if: steps.check.outputs.has_unreleased == 'true'
        id: bump
        run: |
          ./compute-version.sh --ci --update | tee /tmp/bump-output.txt
          VERSION=$(grep '^bump:' /tmp/bump-output.txt | sed 's/.*-> //')
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog
        if: steps.check.outputs.has_unreleased == 'true'
        id: changelog
        run: |
          # Extract content between first ## vX.Y.Z and next ## heading
          awk '/^## v/{if(found)exit; found=1; next} found' CHANGELOG.md > /tmp/release-notes.md

      - name: Create release PR
        if: steps.check.outputs.has_unreleased == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="release/${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "release: ${{ steps.bump.outputs.version }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "release: ${{ steps.bump.outputs.version }}" \
            --body "$(cat /tmp/release-notes.md)" \
            --base main \
            --head "$BRANCH"

  tag-release:
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.event.head_commit.message, 'release:') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version and tag
        id: version
        run: |
          VERSION=$(echo "${{ github.event.head_commit.message }}" | sed 's/release: //')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          TAG="$(date -u +%Y-%m-%dT%H%M%SZ)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog
        run: |
          awk '/^## v/{if(found)exit; found=1; next} found' CHANGELOG.md > /tmp/release-notes.md

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-notes.md
