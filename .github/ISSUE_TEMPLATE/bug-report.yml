name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please include enough detail to reproduce the issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. Include error messages, wrong output, or unexpected behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Commands or steps to trigger the issue.
      placeholder: |
        1. Run `...`
        2. See error in ...
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, log output, or anything else relevant.
    validations:
      required: false
