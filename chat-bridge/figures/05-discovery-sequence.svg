<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380">
  <rect width="700" height="380" rx="12" fill="#0d1117"/>

  <text x="350" y="28" text-anchor="middle" fill="#c9d1d9" font-family="system-ui" font-size="13" font-weight="bold">Agent Discovery via Messages</text>
  <line x1="40" y1="38" x2="660" y2="38" stroke="#30363d"/>

  <!-- Actors -->
  <text x="130" y="60" text-anchor="middle" fill="#533483" font-family="monospace" font-size="12">A (a3f2)</text>
  <line x1="130" y1="68" x2="130" y2="365" stroke="#30363d" stroke-dasharray="4,3"/>

  <text x="350" y="60" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="12">MCP Server</text>
  <line x1="350" y1="68" x2="350" y2="365" stroke="#30363d" stroke-dasharray="4,3"/>

  <text x="570" y="60" text-anchor="middle" fill="#533483" font-family="monospace" font-size="12">B (b7c1)</text>
  <line x1="570" y1="68" x2="570" y2="365" stroke="#30363d" stroke-dasharray="4,3"/>

  <!-- Step 1: A spawns B -->
  <line x1="135" y1="90" x2="345" y2="90" stroke="#2ea043" stroke-width="1.5"/>
  <text x="240" y="85" text-anchor="middle" fill="#2ea043" font-family="monospace" font-size="10">spawn_neighbor()</text>
  <line x1="355" y1="105" x2="565" y2="105" stroke="#2ea043" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="460" y="100" text-anchor="middle" fill="#484f58" font-family="system-ui" font-size="9">launches CLI process</text>
  <text x="350" y="128" text-anchor="middle" fill="#2ea043" font-family="monospace" font-size="10">returns uuid: b7c1</text>

  <!-- Step 2: A sends to B -->
  <line x1="135" y1="155" x2="345" y2="155" stroke="#533483" stroke-width="1.5"/>
  <text x="240" y="150" text-anchor="middle" fill="#533483" font-family="monospace" font-size="10">send(to: b7c1, "hello")</text>
  <text x="460" y="172" text-anchor="middle" fill="#484f58" font-family="system-ui" font-size="9">queued in b7c1 inbox</text>

  <!-- Step 3: B reads -->
  <line x1="565" y1="200" x2="355" y2="200" stroke="#533483" stroke-width="1.5"/>
  <text x="460" y="195" text-anchor="middle" fill="#533483" font-family="monospace" font-size="10">read_inbox()</text>
  <line x1="355" y1="215" x2="565" y2="215" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="460" y="232" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">[{from: a3f2, message: "hello"}]</text>

  <!-- Step 4: B now knows A -->
  <rect x="475" y="245" width="185" height="22" rx="4" fill="#1a1a2e" stroke="#2ea043" stroke-width="1"/>
  <text x="567" y="260" text-anchor="middle" fill="#2ea043" font-family="system-ui" font-size="10">B now knows A exists (from: a3f2)</text>

  <!-- Step 5: B replies -->
  <line x1="565" y1="285" x2="355" y2="285" stroke="#533483" stroke-width="1.5"/>
  <text x="460" y="280" text-anchor="middle" fill="#533483" font-family="monospace" font-size="10">send(to: a3f2, "hi back")</text>

  <!-- Step 6: A reads -->
  <line x1="135" y1="315" x2="345" y2="315" stroke="#533483" stroke-width="1.5"/>
  <text x="240" y="310" text-anchor="middle" fill="#533483" font-family="monospace" font-size="10">read_inbox()</text>
  <line x1="345" y1="330" x2="135" y2="330" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="240" y="347" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">[{from: b7c1, message: "hi back"}]</text>

  <rect x="35" y="355" width="240" height="18" rx="4" fill="#1a1a2e" stroke="#2ea043" stroke-width="1"/>
  <text x="155" y="368" text-anchor="middle" fill="#2ea043" font-family="system-ui" font-size="9">Bidirectional relationship established</text>
</svg>
